{% load i18n %}
<blockquote class="wtr-quote border-l-4 border-primary-600 pl-6">
    <p class="text-xl font-heading italic leading-relaxed">
        &ldquo;{{ value.quote }}&rdquo;
    </p>
    {% if value.attribution %}
        <footer class="mt-3 text-sm opacity-70">
            <cite>{{ value.attribution }}</cite>
        </footer>
    {% endif %}
</blockquote>

{% load i18n wagtailcore_tags wagtailembeds_tags %}
<figure>
    {% if value.embed_url %}
        <div class="relative aspect-video w-full overflow-hidden rounded-lg [&>iframe]:absolute [&>iframe]:inset-0 [&>iframe]:w-full [&>iframe]:h-full">
            {% embed value.embed_url %}
        </div>
    {% elif value.media_file %}
        <video
            controls
            class="w-full rounded-lg"
            {% if value.media_file.thumbnail %}poster="{{ value.media_file.thumbnail.url }}"{% endif %}
        >
            {% for source in value.media_file.sources %}
                <source src="{{ source.src }}" type="{{ source.type }}">
            {% endfor %}
            {% trans "Your browser does not support the video tag." %}
        </video>
    {% endif %}
    {% if value.caption %}
        <figcaption class="mt-2 text-sm opacity-60 text-center">
            {{ value.caption }}
        </figcaption>
    {% endif %}
</figure>
